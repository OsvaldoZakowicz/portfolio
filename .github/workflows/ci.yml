# .github/workflows/ci.yml
name: CI

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  validate:
    name: Validate HTML & assets
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: setup node (for html-validate)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: install html-validate
        run: npm install -g html-validate

      - name: validate html files
        run: html-validate index.html success.html error.html

      - name: check asset references exist
        # verifica que las imagenes y svgs referenciados en el html existan en el repo
        run: |
          echo "verificando assets referenciados..."
          missing=0

          check_file() {
            local file="$1"
            if [ ! -f "$file" ]; then
              echo "  ERROR: no encontrado -> $file"
              missing=$((missing + 1))
            else
              echo "  ok -> $file"
            fi
          }

          # extrae rutas de src y href que apunten a /assets o assets
          grep -oP '(?<=src=")[^"]+|(?<=href=")[^"]+' index.html success.html error.html \
            | grep -E '^(/|\./)?(assets|css)/' \
            | sed 's|^/||' \
            | sort -u \
            | while read -r asset; do
                check_file "$asset"
              done

          if [ "$missing" -gt 0 ]; then
            echo "assets faltantes: $missing"
            exit 1
          fi

          echo "todos los assets encontrados"

      - name: check html file sizes (warn if any > 100kb)
        run: |
          for file in index.html success.html error.html; do
            size=$(wc -c < "$file")
            echo "$file: ${size} bytes"
            if [ "$size" -gt 102400 ]; then
              echo "advertencia: $file supera 100kb"
            fi
          done
